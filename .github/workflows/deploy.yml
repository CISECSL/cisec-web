name: Build and Deploy to GCP

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: aisac-infra
  GCP_REGION: europe-west1
  IMAGE_NAME: cisec-web
  REGISTRY_HOSTNAME: europe-west1-docker.pkg.dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_HOSTNAME }}

      - name: Build and Push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image=${{ env.REGISTRY_HOSTNAME }}/${{ env.GCP_PROJECT_ID }}/containers/${{ env.IMAGE_NAME }}:latest \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --quiet

      - name: Get deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.IMAGE_NAME }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "✅ Deployment successful!"
          echo "Service URL: $URL"
